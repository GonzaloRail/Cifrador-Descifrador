<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cifrados Clásicos | Proyecto Criptografía</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Cifrados Clásicos</h2>
                <span>Módulo de Seguridad</span>
            </div>
            <nav class="sidebar-menu">
                <button class="sidebar-btn active" onclick="mostrarModulo('vigenere-module', this)">
                    <span class="icon">🔑</span> Vigenère
                </button>
                <button class="sidebar-btn" onclick="mostrarModulo('transposicion-module', this)">
                    <span class="icon">📊</span> Transposición
                </button>
            </nav>
        </aside>

        <main class="main-content">

            <section id="vigenere-module" class="container">
                <header>
                    <h1>Cifrado Vigenère</h1>
                    <p>Sustitución polialfabética basada en una clave.</p>
                </header>
                
                <div class="input-group">
                    <label for="message">Mensaje:</label>
                    <textarea id="message" placeholder="EJ: HOLA MUNDO"></textarea>
                </div>
                
                <div class="input-group">
                    <label for="key">Clave:</label>
                    <input type="text" id="key" placeholder="EJ: CIELO">
                </div>

                <div class="input-group">
                    <label for="alphabet">Alfabeto:</label>
                    <select id="alphabet">
                        <option value="std">Español Unificado (38) - A-Z, Ñ, espacio, 0-9</option>
                        <option value="en">Inglés (26) - A-Z</option>
                        <option value="es">Español (27) - A-Z, Ñ</option>
                    </select>
                </div>

                <div class="actions">
                    <button id="btn-encrypt" class="btn primary">Cifrar</button>
                    <button id="btn-decrypt" class="btn secondary">Descifrar</button>
                    <button id="btn-steps" class="btn outline">Ver pasos</button>
                </div>

                <div id="error-message" class="error hidden"></div>

                <div class="result-container">
                    <div class="result-header">
                        <h2>Resultado</h2>
                        <button id="btn-copy" class="btn-icon">📋 Copiar</button>
                    </div>
                    <div id="final-result" class="result-box">Esperando entrada...</div>
                </div>

                <div id="steps-container" class="steps-area hidden">
                    <h3>Análisis Matemático</h3>
                    <div id="formula-info" class="info-tag"></div>
                    <div id="steps-content" class="steps-grid"></div>
                </div>
            </section>

            <section id="transposicion-module" class="container" style="display: none;">
                <header>
                    <h1>Transposición Ininterrumpida</h1>
                    <p>Cifrado por reordenamiento de columnas.</p>
                </header>

                <div class="input-group">
                    <label for="trans-message">Mensaje:</label>
                    <textarea id="trans-message" placeholder="EJ: ESTO ES UNA PRUEBA"></textarea>
                </div>

                <div class="input-group">
                    <label for="trans-key">Clave:</label>
                    <input type="text" id="trans-key" placeholder="EJ: ZEBRA">
                </div>

                <div class="input-group">
                    <label for="trans-alphabet">Alfabeto:</label>
                    <select id="trans-alphabet">
                        <option value="std">Español Unificado (38) - A-Z, Ñ, espacio, 0-9</option>
                        <option value="en">Inglés (26) - A-Z</option>
                        <option value="es">Español (27) - A-Z, Ñ</option>
                    </select>
                </div>

                <div class="actions">
                    <button id="trans-btn-encrypt" class="btn primary">Cifrar</button>
                    <button id="trans-btn-decrypt" class="btn secondary">Descifrar</button>
                    <button id="trans-btn-steps" class="btn outline">Ver pasos</button>
                </div>

                <div id="trans-error-message" class="error hidden"></div>

                <div class="result-container">
                    <div class="result-header">
                        <h2>Resultado</h2>
                        <button id="trans-btn-copy" class="btn-icon">📋 Copiar</button>
                    </div>
                    <div id="trans-final-result" class="result-box">Esperando entrada...</div>
                </div>

                <div id="trans-steps-container" class="steps-area hidden">
                    <h3>Matriz de Transposición</h3>
                    <div id="trans-formula-info" class="info-tag"></div>
                    <div id="trans-steps-content"></div>
                </div>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
